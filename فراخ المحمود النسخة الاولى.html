<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فراخ المحمود - النظام الاحترافي</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Tahoma;
margin:0;
background:#f1f3f5;
}

header{
background:#198754;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:10px;
padding:10px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
background:#0d6efd;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{background:#0b5ed7}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ddd;
padding:6px;
text-align:center;
font-size:14px;
}

th{
background:#198754;
color:white;
}

.kpi{
font-size:18px;
font-weight:bold;
color:#198754;
}

.red{color:red}
.blue{color:#0d6efd}
</style>
</head>

<body>

<header>🐔 فراخ المحمود - النظام الاحترافي</header>

<div class="grid">

<!-- KPI -->
<div class="card">
<h3>💰 صافي الربح اليوم</h3>
<div class="kpi" id="profitToday">0</div>
</div>

<div class="card">
<h3>📦 المخزون الكلي</h3>
<div class="kpi" id="stockTotal">0 كجم</div>
</div>

<div class="card">
<h3>💸 المصروفات اليوم</h3>
<div class="kpi red" id="expenseToday">0</div>
</div>

<div class="card">
<h3>🧾 المبيعات اليوم</h3>
<div class="kpi blue" id="salesToday">0</div>
</div>

</div>

<div class="grid">

<!-- إضافة صنف -->
<div class="card">
<h3>إضافة صنف</h3>
<input id="name" placeholder="اسم الصنف">
<input id="qty" type="number" placeholder="الكمية بالكيلو">
<input id="buy" type="number" placeholder="سعر الشراء">
<input id="sell" type="number" placeholder="سعر البيع">
<button onclick="addItem()">إضافة</button>
</div>

<!-- بيع -->
<div class="card">
<h3>تسجيل بيع</h3>

<select id="saleItem"></select>
<input id="saleQty" type="number" placeholder="الكمية">
<select id="saleType">
<option value="kg">كيلو</option>
<option value="g">جرام</option>
</select>

<button onclick="sellItem()">بيع</button>
</div>

<!-- مصروف -->
<div class="card">
<h3>مصروف</h3>
<input id="expName" placeholder="البيان">
<input id="expValue" type="number" placeholder="المبلغ">
<button onclick="addExpense()">إضافة</button>
</div>

</div>

<!-- جدول الأصناف -->
<div class="card">
<h3>📦 المخزون</h3>
<table>
<thead>
<tr>
<th>الصنف</th>
<th>الكمية</th>
<th>شراء</th>
<th>بيع</th>
<th>حذف</th>
</tr>
</thead>
<tbody id="itemsTable"></tbody>
</table>
</div>

<!-- السجل اليومي -->
<div class="card">
<h3>📅 سجل الأيام</h3>
<table>
<thead>
<tr>
<th>اليوم</th>
<th>مبيعات</th>
<th>مصروفات</th>
<th>ربح</th>
</tr>
</thead>
<tbody id="dailyTable"></tbody>
</table>
</div>

<!-- رسم بياني -->
<div class="card">
<h3>📊 تحليل الأرباح</h3>
<canvas id="chart"></canvas>
</div>

<script>

let items = JSON.parse(localStorage.getItem("items")) || [];
let sales = JSON.parse(localStorage.getItem("sales")) || [];
let expenses = JSON.parse(localStorage.getItem("expenses")) || [];
let daily = JSON.parse(localStorage.getItem("daily")) || [];

function save(){
localStorage.setItem("items",JSON.stringify(items));
localStorage.setItem("sales",JSON.stringify(sales));
localStorage.setItem("expenses",JSON.stringify(expenses));
localStorage.setItem("daily",JSON.stringify(daily));
}

function today(){
return new Date().toLocaleDateString("ar-EG");
}

/* إضافة صنف */
function addItem(){
items.push({
name:name.value,
qty:Number(qty.value),
buy:Number(buy.value),
sell:Number(sell.value)
});
save();
render();
}

/* بيع */
function sellItem(){
let i = saleItem.value;
let q = Number(saleQty.value);
let type = saleType.value;

let real = type==="g"?q/1000:q;

if(real>items[i].qty) return alert("المخزون لا يكفي");

items[i].qty -= real;

sales.push({
date:today(),
value:real*items[i].sell
});

save();
render();
}

/* مصروف */
function addExpense(){
expenses.push({
date:today(),
value:Number(expValue.value)
});
save();
render();
}

/* حساب */
function calc(){
let d = today();

let s = sales.filter(x=>x.date===d)
.reduce((a,b)=>a+b.value,0);

let e = expenses.filter(x=>x.date===d)
.reduce((a,b)=>a+b.value,0);

return {s,e,profit:s-e};
}

/* تحديث يومي */
function updateDaily(){

let d = today();

let s = sales.filter(x=>x.date===d)
.reduce((a,b)=>a+b.value,0);

let e = expenses.filter(x=>x.date===d)
.reduce((a,b)=>a+b.value,0);

let i = daily.findIndex(x=>x.date===d);

if(i===-1){
daily.push({date:d,sales:s,expenses:e,profit:s-e});
}else{
daily[i]={date:d,sales:s,expenses:e,profit:s-e};
}
}

/* عرض */
function render(){

saleItem.innerHTML="";

items.forEach((x,i)=>{
saleItem.innerHTML+=`<option value="${i}">${x.name}</option>`;
});

itemsTable.innerHTML = items.map((x,i)=>
`<tr>
<td>${x.name}</td>
<td>${x.qty.toFixed(2)}</td>
<td>${x.buy}</td>
<td>${x.sell}</td>
<td><button onclick="items.splice(${i},1);save();render()">حذف</button></td>
</tr>`
).join("");

let c = calc();

profitToday.innerText = c.profit.toFixed(2);
salesToday.innerText = c.s;
expenseToday.innerText = c.e;

stockTotal.innerText =
items.reduce((a,b)=>a+b.qty,0).toFixed(2)+" كجم";

updateDaily();

dailyTable.innerHTML = daily.map(d=>
`<tr>
<td>${d.date}</td>
<td>${d.sales.toFixed(2)}</td>
<td>${d.expenses.toFixed(2)}</td>
<td>${d.profit.toFixed(2)}</td>
</tr>`
).join("");

drawChart();

save();
}

/* رسم بياني */
function drawChart(){

let ctx = document.getElementById("chart");

new Chart(ctx,{
type:"line",
data:{
labels:daily.map(d=>d.date),
datasets:[{
label:"الربح اليومي",
data:daily.map(d=>d.profit),
borderColor:"#198754",
fill:false
}]
}
});
}

render();

</script>

</body>
</html>
