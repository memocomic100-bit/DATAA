<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فراخ المحمود</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Tahoma;margin:0;background:#f2f4f6}
header{background:#198754;color:#fff;text-align:center;padding:15px;font-size:20px}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:10px;padding:10px}

.card{background:#fff;padding:15px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,.1)}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
background:#0d6efd;
color:#fff;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{background:#0b5ed7}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ddd;
padding:6px;
text-align:center;
font-size:14px;
}

th{background:#198754;color:#fff}

.kpi{font-size:18px;font-weight:bold;color:#198754}
.red{color:red}
.blue{color:#0d6efd}
</style>
</head>

<body>

<header>🐔 فراخ المحمود - النظام المحاسبي</header>

<div class="grid">

<div class="card">
<h3>💰 ربح اليوم</h3>
<div class="kpi" id="profitToday">0</div>
</div>

<div class="card">
<h3>🧾 مبيعات اليوم</h3>
<div class="kpi blue" id="salesToday">0</div>
</div>

<div class="card">
<h3>💸 مصروفات اليوم</h3>
<div class="kpi red" id="expenseToday">0</div>
</div>

<div class="card">
<h3>📦 المخزون</h3>
<div class="kpi" id="stockTotal">0 كجم</div>
</div>

</div>

<div class="grid">

<div class="card">
<h3>إضافة صنف</h3>
<input id="name" placeholder="اسم الصنف">
<input id="qty" type="number" placeholder="الكمية بالكيلو">
<input id="buy" type="number" placeholder="سعر الشراء">
<input id="sell" type="number" placeholder="سعر البيع">
<button onclick="addItem()">إضافة</button>
</div>

<div class="card">
<h3>تسجيل بيع</h3>

<select id="saleItem"></select>

<input id="saleQty" type="number" placeholder="الكمية">

<select id="saleType">
<option value="kg">كيلو</option>
<option value="g">جرام</option>
</select>

<button onclick="sellItem()">بيع</button>
</div>

<div class="card">
<h3>مصروف</h3>
<input id="expName" placeholder="البيان">
<input id="expValue" type="number" placeholder="المبلغ">
<button onclick="addExpense()">إضافة</button>
</div>

</div>

<div class="card">
<h3>📦 المخزون</h3>
<table>
<thead>
<tr>
<th>الصنف</th>
<th>الكمية</th>
<th>شراء</th>
<th>بيع</th>
<th>حذف</th>
</tr>
</thead>
<tbody id="itemsTable"></tbody>
</table>
</div>

<div class="card">
<h3>📅 سجل الأيام</h3>
<table>
<thead>
<tr>
<th>اليوم</th>
<th>مبيعات</th>
<th>مصروفات</th>
<th>ربح</th>
</tr>
</thead>
<tbody id="dailyTable"></tbody>
</table>
</div>

<div class="card">
<h3>📊 الرسم البياني</h3>
<canvas id="chart"></canvas>
</div>

<script>

let items = JSON.parse(localStorage.getItem("items")) || [];
let sales = JSON.parse(localStorage.getItem("sales")) || [];
let expenses = JSON.parse(localStorage.getItem("expenses")) || [];
let daily = JSON.parse(localStorage.getItem("daily")) || [];

function save(){
localStorage.setItem("items",JSON.stringify(items));
localStorage.setItem("sales",JSON.stringify(sales));
localStorage.setItem("expenses",JSON.stringify(expenses));
localStorage.setItem("daily",JSON.stringify(daily));
}

function today(){
return new Date().toLocaleDateString("ar-EG");
}

/* إضافة صنف */
function addItem(){

const n = document.getElementById("name").value;
const q = Number(document.getElementById("qty").value);
const b = Number(document.getElementById("buy").value);
const s = Number(document.getElementById("sell").value);

if(!n || !q || !b || !s){
alert("أكمل البيانات");
return;
}

items.push({name:n,qty:q,buy:b,sell:s});
save();
render();
}

/* البيع (مضمون 100%) */
function sellItem(){

const select = document.getElementById("saleItem");
const qtyInput = document.getElementById("saleQty");
const type = document.getElementById("saleType");

const index = Number(select.value);
const qty = Number(qtyInput.value);

if(!items[index]){
alert("اختار صنف صحيح");
return;
}

if(!qty || qty <= 0){
alert("أدخل كمية صحيحة");
return;
}

let realQty = (type.value === "g") ? qty / 1000 : qty;

if(realQty > items[index].qty){
alert("المخزون لا يكفي");
return;
}

items[index].qty -= realQty;

let value = realQty * items[index].sell;

sales.push({
name: items[index].name,
qty: realQty,
value: value,
date: new Date().toLocaleString("ar-EG")
});

save();
render();
}

/* مصروف */
function addExpense(){

const name = document.getElementById("expName").value;
const value = Number(document.getElementById("expValue").value);

if(!name || !value){
alert("أكمل البيانات");
return;
}

expenses.push({
name,
value,
date: new Date().toLocaleString("ar-EG")
});

save();
render();
}

/* حساب اليوم */
function calc(){

let d = today();

let s = sales.filter(x=>x.date?.includes(d))
.reduce((a,b)=>a+b.value,0);

let e = expenses.filter(x=>x.date?.includes(d))
.reduce((a,b)=>a+b.value,0);

return {s,e,profit:s-e};
}

/* تحديث يومي */
function updateDaily(){

let d = today();

let s = sales.filter(x=>x.date?.includes(d))
.reduce((a,b)=>a+b.value,0);

let e = expenses.filter(x=>x.date?.includes(d))
.reduce((a,b)=>a+b.value,0);

let i = daily.findIndex(x=>x.date===d);

if(i === -1){
daily.push({date:d,sales:s,expenses:e,profit:s-e});
}else{
daily[i]={date:d,sales:s,expenses:e,profit:s-e};
}
}

/* dropdown آمن */
function fillDropdown(){

const sel = document.getElementById("saleItem");

sel.innerHTML = "";

items.forEach((x,i)=>{
sel.innerHTML += `
<option value="${i}">
${x.name} - ${x.qty.toFixed(2)} كجم
</option>`;
});
}

/* عرض */
function render(){

fillDropdown();

itemsTable.innerHTML = items.map((x,i)=>
`<tr>
<td>${x.name}</td>
<td>${x.qty.toFixed(2)}</td>
<td>${x.buy}</td>
<td>${x.sell}</td>
<td><button onclick="items.splice(${i},1);save();render()">حذف</button></td>
</tr>`
).join("");

let c = calc();

profitToday.innerText = c.profit.toFixed(2);
salesToday.innerText = c.s.toFixed(2);
expenseToday.innerText = c.e.toFixed(2);

stockTotal.innerText =
items.reduce((a,b)=>a+b.qty,0).toFixed(2)+" كجم";

updateDaily();

dailyTable.innerHTML = daily.map(d=>
`<tr>
<td>${d.date}</td>
<td>${d.sales.toFixed(2)}</td>
<td>${d.expenses.toFixed(2)}</td>
<td>${d.profit.toFixed(2)}</td>
</tr>`
).join("");

drawChart();

save();
}

/* chart */
function drawChart(){

const ctx = document.getElementById("chart");

new Chart(ctx,{
type:"line",
data:{
labels:daily.map(d=>d.date),
datasets:[{
label:"الربح",
data:daily.map(d=>d.profit),
borderColor:"#198754",
fill:false
}]
}
});
}

render();

</script>

</body>
</html>
